<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebHost Pro - Welcome</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #0f172a; color: #f8fafc; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; }
        .container { background: rgba(30, 41, 59, 0.7); padding: 3rem; border-radius: 1.5rem; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        h1 { font-size: 3rem; margin-bottom: 1rem; background: linear-gradient(to right, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: #94a3b8; font-size: 1.2rem; }
        .status { margin-top: 2rem; padding: 0.5rem 1rem; background: rgba(34, 197, 94, 0.2); color: #4ade80; border-radius: 9999px; display: inline-block; font-weight: 600; }
    </style>
</head>

    <div class="container">
        <h1>Welcome to WebHost</h1>
        <p>Your web environment is ready.</p>

        <div style="margin-top: 2rem; color: #64748b; font-size: 0.9rem;">Powered by YuraCloud</div>
    </div>

</html>
